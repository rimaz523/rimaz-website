steps:
  - download: current
    artifact: drop

  - task: AzureCLI@2
    displayName: 'Whitelist pipeline agent IP on web app SCM firewall'
    inputs:
      azureSubscription: '$(managedIdentityName)'
      scriptType: pscore
      scriptLocation: inlineScript
      inlineScript: |
        $agentIp = (Invoke-RestMethod -Uri 'https://api.ipify.org').Trim()
        Write-Host "Agent public IP: $agentIp"
        az webapp config access-restriction add `
          --resource-group $(webAppResourceGroup) `
          --name $(project)-$(environment)-$(webAppName) `
          --scm-site true `
          --rule-name $(scmAllowRuleName) `
          --action Allow `
          --priority 100 `
          --ip-address "$agentIp/32"

  - task: AzureWebApp@1
    displayName: 'Deploy angular front-end webapp to azure app service'
    inputs:
      azureSubscription: '$(managedIdentityName)'
      appName: '$(project)-$(environment)-$(webAppName)'
      appType: 'webAppLinux'
      package: '$(Pipeline.Workspace)/drop/$(Build.BuildId).zip'
      appSettings: |
        -APPINSIGHTS_INSTRUMENTATIONKEY $(keyVaultAppInsightsKey) 
        -APPLICATIONINSIGHTS_CONNECTION_STRING $(keyVaultAppInsightsConnectionString) 
        -APPINSIGHTS_PROFILERFEATURE_VERSION 1.0.0 
        -APPINSIGHTS_SNAPSHOTFEATURE_VERSION 1.0.0 
        -ApplicationInsightsAgent_EXTENSION_VERSION ~3 
        -DiagnosticServices_EXTENSION_VERSION ~3 
        -InstrumentationEngine_EXTENSION_VERSION disabled 
        -SnapshotDebugger_EXTENSION_VERSION disabled 
        -XDT_MicrosoftApplicationInsights_BaseExtensions disabled 
        -XDT_MicrosoftApplicationInsights_Mode recommended 
        -XDT_MicrosoftApplicationInsights_PreemptSdk disabled

  - task: AzureCLI@2
    displayName: 'Remove pipeline agent IP from web app SCM firewall'
    condition: always()
    inputs:
      azureSubscription: '$(managedIdentityName)'
      scriptType: pscore
      scriptLocation: inlineScript
      inlineScript: |
        az webapp config access-restriction remove `
          --resource-group $(webAppResourceGroup) `
          --name $(project)-$(environment)-$(webAppName) `
          --scm-site true `
          --rule-name $(scmAllowRuleName)
